<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سلة التسوق | شركة عمران التجارية</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- الهيدر الرئيسي -->
  <header class="main-header sticky-top">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-6">
          <a href="index.html" class="brand-logo">عمران <span>للالعاب</span></a>
        </div>
        <div class="col-6 text-left">
          <a href="index.html" class="btn btn-outline-secondary btn-sm">متابعة التسوق</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <h3 class="font-weight-bold mb-4"><i class="fas fa-shopping-bag text-warning ml-2"></i>سلة التسوق</h3>

    <div class="row">
      <!-- قائمة المنتجات المضافة -->
      <div class="col-lg-8 mb-4">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table cart-table align-middle mb-0">
                <thead class="bg-light">
                  <tr>
                    <th>المنتج</th>
                    <th>السعر</th>
                    <th>الكمية</th>
                    <th>الإجمالي</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>
                      <div class="d-flex align-items-center">
                        <div class="bg-light p-2 rounded mr-3 text-center" style="width: 50px;">
                          <i class="fas fa-puzzle-piece text-secondary"></i>
                        </div>
                        <div>
                          <h6 class="mb-0 font-weight-bold">مجموعة المكعبات الخشبية</h6>
                          <small class="text-muted">عمر +3 سنوات</small>
                        </div>
                      </div>
                    </td>
                    <td>85 ر.س</td>
                    <td>
                      <input type="number" class="form-control form-control-sm text-center" value="1" style="width: 60px;">
                    </td>
                    <td class="font-weight-bold text-primary">85 ر.س</td>
                    <td>
                      <button class="btn btn-link text-danger p-0"><i class="fas fa-trash-alt"></i></button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ملخص الحساب والإتمام -->
      <div class="col-lg-4">
        <div class="summary-box">
          <h5 class="font-weight-bold mb-3">ملخص الطلب</h5>
          
          <div class="summary-item">
            <span>مجموع المنتجات:</span>
            <span>85 ر.س</span>
          </div>
          <div class="summary-item">
            <span>تكلفة الشحن:</span>
            <span class="text-success">مجاني</span>
          </div>
          <div class="summary-item">
            <span>الضريبة (15%):</span>
            <span>12.75 ر.س</span>
          </div>

          <div class="summary-item summary-total mt-3">
            <span>الإجمالي الكلي:</span>
            <span>97.75 ر.س</span>
          </div>

          <button class="btn btn-primary-custom btn-block btn-lg mt-4">
            إتمام الشراء <i class="fas fa-arrow-left mr-2"></i>
          </button>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
